<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="display:none">
  <symbol id="mark" viewBox="0 0 32 32">
    <!-- Stylised "Neuron" mark: two nodes joined by a synapse-like arc,
         echoing the seller → buyer → FID topology. -->
    <g fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
      <path d="M6 22 C 10 8, 22 24, 26 10"/>
    </g>
    <g fill="currentColor">
      <circle cx="6" cy="22" r="3"/>
      <circle cx="26" cy="10" r="3"/>
      <circle cx="16" cy="16" r="1.6" opacity="0.55"/>
    </g>
  </symbol>
</svg>
